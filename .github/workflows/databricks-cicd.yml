name: "Validate and Deploy DAB"

concurrency: 1

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'

jobs:
  validate:
    name: "Validate asset bundle"
    runs-on: ubuntu-latest

    env:
      BUNDLE_VAR_env: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev'}}
      DATABRICKS_HOST: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_PROD_HOST || secrets.DATABRICKS_DEV_HOST }}
      DATABRICKS_ACCOUNT_ID: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_DEV_ACCOUNT_ID || secrets.DATABRICKS_DEV_ACCOUNT_ID }}
      DATABRICKS_CLIENT_ID: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_PROD_CLIENT_ID || secrets.DATABRICKS_DEV_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_PROD_CLIENT_SECRET || secrets.DATABRICKS_DEV_CLIENT_SECRET }}
      BUNDLE_VAR_feedback_table: ${{ github.ref == 'refs/heads/main' && secrets.DAB_FEEDBACK_TABLE_PROD || secrets.DAB_FEEDBACK_TABLE_DEV }}
      BUNDLE_VAR_warehouse_id: ${{ github.ref == 'refs/heads/main' && secrets.DAB_WAREHOUSE_ID_PROD || secrets.DAB_WAREHOUSE_ID_DEV }}
      BUNDLE_VAR_trace_table: ${{ github.ref == 'refs/heads/main' && secrets.DAB_TRACE_TABLE_PROD || secrets.DAB_TRACE_TABLE_DEV }}

    steps:
      - uses: actions/checkout@v4

      - name: Preflight env var check
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          require() {
            local name="$1"
            if [[ -z "${!name:-}" ]]; then
              echo "::error title=Missing required env var::${name} is not set"
              missing=1
            fi
          }
          require DATABRICKS_HOST
          require DATABRICKS_ACCOUNT_ID
          require DATABRICKS_CLIENT_ID
          require DATABRICKS_CLIENT_SECRET
          require BUNDLE_VAR_env
          require BUNDLE_VAR_feedback_table
          require BUNDLE_VAR_warehouse_id
          require BUNDLE_VAR_trace_table
          exit "$missing"
        working-directory: .

      - name: setup databricks
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate -t $BUNDLE_VAR_env
        working-directory: .
  test:
    name: "Run tests"
    runs-on: ubuntu-latest
    env:
      BUNDLE_VAR_env: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev'}}
      DATABRICKS_HOST: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_PROD_HOST || secrets.DATABRICKS_DEV_HOST }}
      DATABRICKS_ACCOUNT_ID: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_DEV_ACCOUNT_ID || secrets.DATABRICKS_DEV_ACCOUNT_ID }}
      DATABRICKS_CLIENT_ID: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_PROD_CLIENT_ID || secrets.DATABRICKS_DEV_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_PROD_CLIENT_SECRET || secrets.DATABRICKS_DEV_CLIENT_SECRET }}
      DATABRICKS_WAREHOUSE_ID: ${{ github.ref == 'refs/heads/main' && secrets.DAB_WAREHOUSE_ID_PROD || secrets.DAB_WAREHOUSE_ID_DEV }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Run Databricks integration tests
        run: pytest -m integration -q

  deploy:
    if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.ref, 'refs/heads/bugfix/')) && github.event_name == 'push' }}
    needs: [validate, test]
    name: "deploy asset bundle"
    runs-on: ubuntu-latest
    concurrency:
      group: dab-deploy-${{ github.repository }}
      cancel-in-progress: true

    env:
      BUNDLE_VAR_env: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev'}}
      BUNDLE_BIND_APP: ${{ secrets.DAB_BIND_APP == 'true' }}
      DATABRICKS_HOST: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_PROD_HOST || secrets.DATABRICKS_DEV_HOST }}
      DATABRICKS_ACCOUNT_ID: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_DEV_ACCOUNT_ID || secrets.DATABRICKS_DEV_ACCOUNT_ID }}
      DATABRICKS_CLIENT_ID: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_PROD_CLIENT_ID || secrets.DATABRICKS_DEV_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ github.ref == 'refs/heads/main' && secrets.DATABRICKS_PROD_CLIENT_SECRET || secrets.DATABRICKS_DEV_CLIENT_SECRET }}
      BUNDLE_VAR_feedback_table: ${{ github.ref == 'refs/heads/main' && secrets.DAB_FEEDBACK_TABLE_PROD || secrets.DAB_FEEDBACK_TABLE_DEV }}
      BUNDLE_VAR_warehouse_id: ${{ github.ref == 'refs/heads/main' && secrets.DAB_WAREHOUSE_ID_PROD || secrets.DAB_WAREHOUSE_ID_DEV }}
      BUNDLE_VAR_trace_table: ${{ github.ref == 'refs/heads/main' && secrets.DAB_TRACE_TABLE_PROD || secrets.DAB_TRACE_TABLE_DEV }}

    steps:
      - uses: actions/checkout@v4

      - name: Preflight env var check
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          require() {
            local name="$1"
            if [[ -z "${!name:-}" ]]; then
              echo "::error title=Missing required env var::${name} is not set"
              missing=1
            fi
          }
          require DATABRICKS_HOST
          require DATABRICKS_ACCOUNT_ID
          require DATABRICKS_CLIENT_ID
          require DATABRICKS_CLIENT_SECRET
          require BUNDLE_VAR_env
          require BUNDLE_VAR_feedback_table
          require BUNDLE_VAR_warehouse_id
          require BUNDLE_VAR_trace_table
          exit "$missing"
        working-directory: .

      - name: setup databricks
        uses: databricks/setup-cli@main

      - name: Log bind setting
        run: echo "BUNDLE_BIND_APP=${BUNDLE_BIND_APP}"
        working-directory: .

      - name: Bind existing app
        if: ${{ env.BUNDLE_BIND_APP == 'true' }}
        run: databricks bundle deployment bind feedback_api feedback-api --auto-approve -t $BUNDLE_VAR_env
        working-directory: .

      - name: Deploy bundle
        run: databricks bundle deploy -t $BUNDLE_VAR_env --verbose
        working-directory: .

      - name: Verify streaming job deployment
        run: |
          echo "Checking for streaming job in $BUNDLE_VAR_env environment..."
          databricks jobs list --output json > jobs_list.json
          if grep -q "feedback-linking-streaming" jobs_list.json; then
            echo "✓ Streaming job 'feedback-linking-streaming' found"
            JOB_ID=$(cat jobs_list.json | jq -r ".[] | select(.settings.name | contains(\"feedback-linking-streaming\")) | select(.settings.deployment.metadata_file_path | contains(\"/$BUNDLE_VAR_env/\")) | .job_id" | head -1)
            JOB_NAME=$(cat jobs_list.json | jq -r ".[] | select(.job_id==$JOB_ID) | .settings.name")
            echo "Environment: $BUNDLE_VAR_env"
            echo "Job Name: $JOB_NAME"
            echo "Job ID: $JOB_ID"
            echo ""
            echo "Full job details:"
            databricks jobs get $JOB_ID
          else
            echo "✗ ERROR: Streaming job 'feedback-linking-streaming' NOT FOUND"
            echo "Available jobs:"
            cat jobs_list.json | jq -r '.[] | .settings.name'
            exit 1
          fi
        working-directory: .

      - name: Run feedback table DDL
        run: databricks bundle run feedback-table-ddl -t $BUNDLE_VAR_env
        working-directory: .