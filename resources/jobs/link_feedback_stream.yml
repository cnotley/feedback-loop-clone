resources:
  jobs:
    feedback-linking-stream:
      name: feedback-linking-streaming
      tasks:
        - task_key: link-feedback-stream
          job_cluster_key: feedback-linking-stream-cluster
          spark_python_task:
            python_file: ../../scripts/stream_linking.py
            parameters:
              - --feedback-table
              - ${var.feedback_table}
              - --trace-table
              - ${var.trace_table}
              - --index-table
              - ${var.trace_index_table}
              - --checkpoint
              - ${var.link_stream_checkpoint}
              - --trigger-seconds
              - ${var.link_stream_trigger_seconds}
              - --reconcile-lookback-hours
              - ${var.link_reconcile_lookback_hours}
              - --reconcile-max-rows
              - ${var.link_reconcile_max_rows}
          max_retries: 3
          timeout_seconds: 0
      permissions:
        - level: CAN_VIEW
          user_name: Philip-Mathieu@idexx.com
        - level: CAN_MANAGE_RUN
          user_name: chris-notley@idexx.com
      job_clusters:
        - job_cluster_key: feedback-linking-stream-cluster
          new_cluster:
            spark_version: ${var.link_spark_version}
            node_type_id: ${var.link_node_type_id}
            num_workers: ${var.link_num_workers}
            data_security_mode: ${var.link_data_security_mode}
            runtime_engine: ${var.link_runtime_engine}
            aws_attributes:
              availability: ${var.link_aws_availability}
